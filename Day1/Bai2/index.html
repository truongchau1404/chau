<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BANG DIEM CUA EM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="activity">Activity</div>

<div class="container">
    <h1>BANG DIEM CUA EM</h1>

    <div class="row">
        <label>Semester1:</label>
        <input type="number" id="s1" value="9">
    </div>

    <div class="row">
        <label>Semester2:</label>
        <input type="number" id="s2" value="10">
    </div>

    <div class="row">
        <label>Year:</label>
        <select id="year">
            <option>1</option>
            <option selected>2</option>
            <option>3</option>
            <option>4</option>
        </select>
    </div>

    <div class="row">
        <label>Summarise:</label>
        <input type="text" id="avg" readonly>
    </div>

    <div id="result" class="result">Hoc sinh gioi</div>

    <div class="buttons">
        <button onclick="calculate()">OK</button>
        <button onclick="resetForm()">Cancel</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
