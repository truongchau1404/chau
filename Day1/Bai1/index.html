<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML - CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="activity">Activity</div>

<div class="main-title">HTML - CSS</div>

<div class="container">
    <div class="header">
        <h2>WOMEN'S PRODUCTS</h2>
        <ul class="menu">
            <li class="active">All</li>
            <li>Clothings</li>
            <li>Bags</li>
            <li>Shoes</li>
            <li>Watches</li>
            <li>Googles</li>
        </ul>
    </div>

    <div class="content">
        <div class="products">
            <div class="card">
                <img src="images/bag.jpg" alt="">
                <h3>Women Bags</h3>
                <p class="old">€100.00</p>
                <p class="price">€60.00</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="images/google.jpg" alt="">
                <h3>Google</h3>
                <p class="price">€25.00</p>
                <button>Add to Cart</button>
            </div>
        </div>

        <div class="banner">
            <div class="banner-text">
                <h1>FOR WOMEN</h1>
                <button>VIEW ALL</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
